name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fast pure-logic unit tests (protocol decode/CRC/enum, battery time,
      # retry classification, fast-report probe). Fail fast before the heavier
      # build + browser e2e.
      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Build and serve THIS commit's code, then test it — not the live
      # production site. baseURL is overridden via E2E_BASE_URL.
      - name: Build web app
        env:
          VITE_PUSH_ENABLED: 'true'
        run: npm run build

      - name: Serve build
        run: |
          npx vite preview --port 4173 &
          npx wait-on http://localhost:4173 --timeout 60000

      - name: Run E2E tests against the built app
        env:
          E2E_BASE_URL: http://localhost:4173
        # Exclude the real-account group: it needs live backend credentials that
        # must NOT live in the repo. Run those only in a protected manual
        # workflow with secrets, never on PRs.
        run: npx playwright test --project="Mobile Chrome (iPhone 16)" --grep-invert "jason1324" --reporter=list,html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
