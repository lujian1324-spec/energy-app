name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/ios.yml'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      # Unsigned simulator build — proves the iOS project compiles.
      # Device/TestFlight builds need signing certs (see docs/NATIVE_SETUP.md).
      - name: Build for iOS Simulator
        working-directory: ios/App
        run: |
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
