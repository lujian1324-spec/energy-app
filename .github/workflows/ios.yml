name: Build iOS App

# Builds a signed iOS IPA and uploads it to TestFlight when Apple signing secrets
# are present; otherwise falls back to an UNSIGNED iOS Simulator build (compile
# check only — not installable on a real device). Mirrors android-release.yml's
# "degrade gracefully when secrets are missing" pattern.
#
# Required GitHub repo Secrets (Settings → Secrets and variables → Actions):
#   IOS_DIST_CERT_P12_BASE64     - Apple Distribution cert (.p12), base64:
#                                    base64 -i dist.p12 | pbcopy
#   IOS_DIST_CERT_PASSWORD       - password for that .p12
#   IOS_PROVISION_PROFILE_BASE64 - App Store provisioning profile (.mobileprovision),
#                                    base64:  base64 -i profile.mobileprovision | pbcopy
#   IOS_PROVISION_PROFILE_NAME   - the profile's exact name (for ExportOptions)
#   APPLE_TEAM_ID                - 10-char Apple Developer Team ID
#   ASC_KEY_ID / ASC_ISSUER_ID   - App Store Connect API key ID + issuer ID
#   ASC_API_KEY_P8_BASE64        - the App Store Connect API key (.p8), base64
# Without the signing secrets the job builds an UNSIGNED simulator app and says so.
#
# Bundle id: com.sierro.energyapp (must be registered in App Store Connect first).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/ios.yml'

jobs:
  build:
    # macos-15 ships Xcode 26+. This is REQUIRED: the Capacitor 8.4.x SPM binary
    # (capacitor-swift-pm's Capacitor.xcframework) is built with Swift 6.2, and an
    # older Xcode (e.g. 15.4 on macos-14, Swift 5.10) cannot parse its .swiftinterface
    # — the Capacitor module imports with missing members and the plugins fail to
    # compile ("value of type 'any CAPBridgeProtocol' has no member 'webView'").
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build web app
        env:
          VITE_PUSH_ENABLED: 'true'
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Detect signing secrets
        id: signing
        env:
          CERT: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::iOS signing secrets present — building a SIGNED IPA and uploading to TestFlight."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::iOS signing secrets absent — building an UNSIGNED iOS Simulator app (not installable). Add IOS_DIST_CERT_P12_BASE64, IOS_DIST_CERT_PASSWORD, IOS_PROVISION_PROFILE_BASE64, IOS_PROVISION_PROFILE_NAME, APPLE_TEAM_ID, ASC_KEY_ID, ASC_ISSUER_ID and ASC_API_KEY_P8_BASE64 to produce a TestFlight build."
          fi

      # ───────────────────────── SIGNED path ─────────────────────────
      - name: Import certificate & provisioning profile
        if: steps.signing.outputs.signed == 'true'
        env:
          CERT_B64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE_B64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KC_PW="$(uuidgen)"
          security create-keychain -p "$KC_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PW" "$KEYCHAIN"
          echo "$CERT_B64" | base64 -d > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$CERT_PW" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PW" "$KEYCHAIN" >/dev/null
          # Make the temp keychain visible to codesign alongside the login keychain.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/["]//g')
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROFILE_B64" | base64 -d > "$HOME/Library/MobileDevice/Provisioning Profiles/build.mobileprovision"

      - name: Set marketing & build version
        if: steps.signing.outputs.signed == 'true'
        working-directory: ios/App
        env:
          MARKETING_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Marketing version from package.json; build number from the run number so
          # every TestFlight upload strictly increments.
          agvtool new-marketing-version "$MARKETING_VERSION" || true
          agvtool new-version -all "${{ github.run_number }}" || true

      - name: Archive & export signed IPA
        if: steps.signing.outputs.signed == 'true'
        working-directory: ios/App
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          PLIST="$RUNNER_TEMP/ExportOptions.plist"
          printf '%s' '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict></dict></plist>' > "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :method string app-store" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :uploadSymbols bool true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.sierro.energyapp string $PROFILE_NAME" "$PLIST"

          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$PLIST" \
            -exportPath "$RUNNER_TEMP/export"

          cp "$RUNNER_TEMP/export/App.ipa" "sierro-energy-v${VERSION}.ipa"

      - name: Upload IPA artifact
        if: steps.signing.outputs.signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sierro-energy-v${{ steps.ver.outputs.version }}-ipa
          path: sierro-energy-v${{ steps.ver.outputs.version }}.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: steps.signing.outputs.signed == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          export API_PRIVATE_KEYS_DIR="$RUNNER_TEMP/private_keys"
          mkdir -p "$API_PRIVATE_KEYS_DIR"
          echo "$ASC_API_KEY_P8_BASE64" | base64 -d > "$API_PRIVATE_KEYS_DIR/AuthKey_${ASC_KEY_ID}.p8"
          xcrun altool --upload-app \
            -f "sierro-energy-v${VERSION}.ipa" \
            --type ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      # ─────────────────────── UNSIGNED fallback ───────────────────────
      # Proves the iOS project compiles without any Apple credentials.
      - name: Build for iOS Simulator (unsigned compile check)
        if: steps.signing.outputs.signed == 'false'
        working-directory: ios/App
        run: |
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
