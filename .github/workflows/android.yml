name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build web app
        env:
          VITE_PUSH_ENABLED: 'true'
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk sierro-energy-v${{ steps.ver.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sierro-energy-v${{ steps.ver.outputs.version }}-apk
          path: sierro-energy-v${{ steps.ver.outputs.version }}.apk
          retention-days: 30

      # Publish a Release so there is a clean, direct .apk download link
      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ steps.ver.outputs.version }}
          name: Sierro Energy APK v${{ steps.ver.outputs.version }}
          body: |
            Debug-signed Android APK built from `main` (v${{ steps.ver.outputs.version }}).
            Install on a device with "Unknown sources" enabled. For Play Store release,
            sign with a release keystore (see docs/NATIVE_SETUP.md).
          files: sierro-energy-v${{ steps.ver.outputs.version }}.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
